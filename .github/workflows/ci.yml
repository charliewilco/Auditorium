name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  macos:
    name: macOS app
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: xcodebuild build -project Auditorium/Auditorium.xcodeproj -scheme Auditorium -configuration Debug -destination 'platform=macOS,arch=arm64' CODE_SIGNING_ALLOWED=NO
      - name: Test
        run: xcodebuild test -project Auditorium/Auditorium.xcodeproj -scheme Auditorium -configuration Debug -destination 'platform=macOS,arch=arm64' CODE_SIGNING_ALLOWED=NO

  rust:
    name: symphony
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Format
        run: cargo fmt --all --check
      - name: Test
        run: cargo test --all-targets
      - name: CLI help
        run: cargo run -p symphony -- --help
