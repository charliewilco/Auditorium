name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  swift:
    name: Swift package
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: swift build
      - name: Test
        run: swift test

  macos:
    name: macOS app smoke
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - name: Build app target
        run: xcodebuild build -workspace Auditorium.xcworkspace -scheme Auditorium -configuration Debug -destination 'platform=macOS,arch=arm64' CODE_SIGNING_ALLOWED=NO

  rust:
    name: symphony
    runs-on: macos-15
    env:
      CARGO_HTTP_MULTIPLEXING: false
      CARGO_NET_RETRY: 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Fetch dependencies
        run: cargo fetch --locked
      - name: Format
        run: cargo fmt --all --check
      - name: Test
        run: cargo test --all-targets
      - name: CLI help
        run: cargo run -p symphony -- --help
